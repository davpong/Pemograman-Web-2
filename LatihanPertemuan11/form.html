<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Buku Tamu</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0f1117;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e8eaf0;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,102,241,.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,.07) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .card {
    position: relative;
    width: 100%;
    max-width: 640px;
    background: #16181f;
    border: 1px solid rgba(99,102,241,.25);
    border-radius: 20px;
    padding: 2.5rem;
    box-shadow: 0 0 60px rgba(99,102,241,.12);
  }

  .card-header { text-align: center; margin-bottom: 2rem; }

  .badge-title {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(99,102,241,.15);
    border: 1px solid rgba(99,102,241,.3);
    border-radius: 100px;
    padding: 4px 14px;
    font-size: 12px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #a5b4fc;
    margin-bottom: 1rem;
  }
  .badge-title svg { width: 14px; height: 14px; }

  h1 {
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    margin-bottom: .5rem;
  }
  h1 span { color: #818cf8; }
  .subtitle { font-size: 14px; color: #6b7280; }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(99,102,241,.3), transparent);
    margin: 1.5rem 0;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #4b5563;
    margin-bottom: .75rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,.05);
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem; }
  .form-group:last-child { margin-bottom: 0; }

  label {
    font-size: 13px;
    color: #9ca3af;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  label .req { color: #f87171; }

  input, select, textarea {
    background: #0f1117;
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 10px;
    padding: .65rem .9rem;
    color: #e8eaf0;
    font-size: 14px;
    font-family: inherit;
    width: 100%;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  input::placeholder, textarea::placeholder { color: #374151; }
  input:focus, select:focus, textarea:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,.15);
  }
  select { appearance: none; cursor: pointer; }
  select option { background: #16181f; }
  textarea { resize: vertical; min-height: 90px; }

  .star-group { display: flex; flex-direction: row-reverse; gap: 4px; }
  .star-group input[type="radio"] { display: none; }
  .star-group label {
    font-size: 26px;
    cursor: pointer;
    color: #374151;
    transition: color .15s, transform .15s;
    padding: 0;
  }
  .star-group label:hover,
  .star-group label:hover ~ label,
  .star-group input[type="radio"]:checked ~ label { color: #f59e0b; }
  .star-group label:hover { transform: scale(1.15); }

  .btn-submit {
    width: 100%;
    padding: .85rem;
    margin-top: 1.5rem;
    background: #4f46e5;
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background .2s, transform .15s, box-shadow .2s;
    box-shadow: 0 4px 20px rgba(79,70,229,.3);
  }
  .btn-submit:hover { background: #4338ca; box-shadow: 0 6px 28px rgba(79,70,229,.45); }
  .btn-submit:active { transform: scale(.98); }
  .btn-submit svg { width: 18px; height: 18px; }
  .btn-submit.loading { opacity: .7; pointer-events: none; }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1d26;
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 12px;
    padding: .75rem 1.25rem;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 260px;
    transition: transform .35s cubic-bezier(.22,.68,0,1.2);
    z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(52,211,153,.35); }
  .toast.success .toast-icon { color: #34d399; }
  .toast.error   { border-color: rgba(248,113,113,.35); }
  .toast.error   .toast-icon { color: #f87171; }
  .toast-icon { font-size: 18px; }
  .toast-msg { flex: 1; }

  @media (max-width: 520px) {
    .card { padding: 1.5rem; }
    .grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="badge-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      Buku Tamu Digital
    </div>
    <h1>Selamat <span>Datang!</span></h1>
    <p class="subtitle">Mohon isi data kunjungan Anda dengan lengkap.</p>
  </div>

  <div class="divider"></div>

  <form id="tamufm" novalidate>

    <p class="section-label">Data Pribadi</p>

    <div class="grid-2">
      <div class="form-group">
        <label for="nama">Nama Lengkap <span class="req">*</span></label>
        <input type="text" id="nama" name="nama" placeholder="Contoh: Budi Santoso" required />
      </div>
      <div class="form-group">
        <label for="no_telepon">No. Telepon <span class="req">*</span></label>
        <input type="tel" id="no_telepon" name="no_telepon" placeholder="08xxxxxxxxxx" required />
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email <span class="req">*</span></label>
      <input type="email" id="email" name="email" placeholder="email@contoh.com" required />
    </div>

    <div class="form-group">
      <label for="instansi">Instansi / Perusahaan</label>
      <input type="text" id="instansi" name="instansi" placeholder="(opsional)" />
    </div>

    <div class="divider"></div>

    <p class="section-label">Data Kunjungan</p>

    <div class="grid-2">
      <div class="form-group">
        <label for="keperluan">Keperluan <span class="req">*</span></label>
        <select id="keperluan" name="keperluan" required>
          <option value="" disabled selected>Pilih keperluan…</option>
          <option>Kunjungan</option>
          <option>Rapat / Meeting</option>
          <option>Pengambilan Dokumen</option>
          <option>Pengiriman Barang</option>
          <option>Konsultasi</option>
          <option>Lainnya</option>
        </select>
      </div>
      <div class="form-group">
        <label for="tanggal">Tanggal Kunjungan <span class="req">*</span></label>
        <input type="date" id="tanggal" name="tanggal" required />
      </div>
    </div>

    <div class="form-group" style="max-width:200px">
      <label for="jam_masuk">Jam Masuk <span class="req">*</span></label>
      <input type="time" id="jam_masuk" name="jam_masuk" required />
    </div>

    <div class="form-group">
      <label for="pesan">Pesan / Catatan</label>
      <textarea id="pesan" name="pesan" placeholder="Tuliskan pesan atau kesan kunjungan Anda…"></textarea>
    </div>

    <div class="divider"></div>

    <p class="section-label">Penilaian Layanan</p>
    <div class="form-group">
      <label>Beri bintang <span class="req">*</span></label>
      <div class="star-group" id="stars">
        <input type="radio" id="s5" name="penilaian" value="5" checked /><label for="s5" title="Sangat Baik">★</label>
        <input type="radio" id="s4" name="penilaian" value="4" /><label for="s4" title="Baik">★</label>
        <input type="radio" id="s3" name="penilaian" value="3" /><label for="s3" title="Cukup">★</label>
        <input type="radio" id="s2" name="penilaian" value="2" /><label for="s2" title="Kurang">★</label>
        <input type="radio" id="s1" name="penilaian" value="1" /><label for="s1" title="Sangat Kurang">★</label>
      </div>
    </div>

    <button type="submit" class="btn-submit" id="btnSubmit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M22 2 11 13"/>
        <path d="M22 2 15 22 11 13 2 9l20-7z"/>
      </svg>
      Kirim Data Kunjungan
    </button>

  </form>
</div>

<div class="toast" id="toast" role="alert">
  <span class="toast-icon" id="toastIcon">✓</span>
  <span class="toast-msg"  id="toastMsg"></span>
</div>

<script>
  const now = new Date();
  document.getElementById('tanggal').value = now.toISOString().slice(0, 10);
  document.getElementById('jam_masuk').value = now.toTimeString().slice(0, 5);

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    const i = document.getElementById('toastIcon');
    const m = document.getElementById('toastMsg');
    t.className = 'toast ' + type;
    i.textContent = type === 'success' ? '✓' : '✕';
    m.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4000);
  }

  document.getElementById('tamufm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnSubmit');
    btn.classList.add('loading');
    btn.textContent = 'Mengirim…';

    try {
      const fd = new FormData(e.target);
      const res = await fetch('simpan.php', { method: 'POST', body: fd });
      const data = await res.json();

      if (data.status === 'success') {
        showToast(data.message, 'success');
        e.target.reset();
        document.getElementById('tanggal').value = now.toISOString().slice(0, 10);
        document.getElementById('jam_masuk').value = now.toTimeString().slice(0, 5);
        document.getElementById('s5').checked = true;
      } else {
        showToast(data.message, 'error');
      }
    } catch (err) {
      showToast('Gagal menghubungi server. Periksa XAMPP Anda.', 'error');
    } finally {
      btn.classList.remove('loading');
      btn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M22 2 11 13"/>
          <path d="M22 2 15 22 11 13 2 9l20-7z"/>
        </svg>
        Kirim Data Kunjungan`;
    }
  });
</script>
</body>
</html>
